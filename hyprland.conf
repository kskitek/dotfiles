# https://wiki.hyprland.org/Configuring/
# source = ~/.config/hypr/myColors.conf

## Monitors
monitor=,preferred,auto,1
monitor=eDP-1,1920x1200@60,0x2160,1
monitor=DP-2,3840x2160@60,0x0,1.2
monitor=DP-4,3840x2160@60,0x0,1.2

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

## Envs
env = HYPRCURSOR_SIZE,22
env = XCURSOR_SIZE,21

env = XDG_CONFIG_DIR,~/.config
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

## Permissions
# See https://wiki.hyprland.org/Configuring/Permissions/

## LaF
# Refer to https://wiki.hyprland.org/Configuring/Variables/
# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 7

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 1

    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.3
    dim_special = 0.3

    shadow:enabled = false
    blur:enabled = false
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    preserve_split = true
    use_active_for_splits = true
    split_bias = 1
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

## Input
input {
    kb_layout = pl
    follow_mouse = 2
    mouse_refocus = false
    touchpad {
        natural_scroll = false
    }
}
cursor {
	no_warps = true
	persistent_warps = true
	warp_on_change_workspace = 1
	warp_on_toggle_special = 1
	zoom_factor = 1.0
	default_monitor = DP-2
	warp_back_after_non_mouse_input = true
}
gestures {
    # workspace_swipe = true
    workspace_swipe_touch = true
    workspace_swipe_create_new = false
}


## Keybinds
# bind  - standard binding
# bindr - layout independent - 

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, w, killactive,
bind = $mainMod SHIFT, x, exit,
bind = $mainMod SHIFT, f, togglefloating,
bind = $mainMod, m, fullscreen, 1
bind = $mainMod, Space, exec, $menu
bind = $mainMod SHIFT, b, exec, hyprctl dispatch layoutmsg togglesplit

bind = $mainMod SHIFT, m, exec, hyprctl keyword cursor:zoom_factor 2.0
bind = $mainMod CTRL, m, exec, hyprctl keyword cursor:zoom_factor 1.0

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, SHIFT h, movewindow, l
bind = $mainMod, SHIFT l, movewindow, r
bind = $mainMod, SHIFT k, movewindow, u
bind = $mainMod, SHIFT j, movewindow, d

bind = $mainMod CTRL, h, exec, hyprctl dispatch layoutmsg preselect l
bind = $mainMod CTRL, l, exec, hyprctl dispatch layoutmsg preselect r
bind = $mainMod CTRL, k, exec, hyprctl dispatch layoutmsg preselect u
bind = $mainMod CTRL, j, exec, hyprctl dispatch layoutmsg preselect d
bind = $mainMod CTRL, y, exec, ~/.dotfiles/scripts/move_to_presel.sh

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Example special workspace (scratchpad)
bind = $mainMod, s, togglespecialworkspace, magic
bind = $mainMod SHIFT, s, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
#bind = $mainMod, mouse_down, workspace, e+1
#bind = $mainMod, mouse_up, workspace, e-1
binde = $mainMod, n, workspace, e+1
binde = $mainMod, p, workspace, e-1

bind = $mainMod, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
submap = reset

bind = $mainMod, q, exec, loginctl lock-session
bind = $mainMod SHIFT, q, exec, ~/.dotfiles/scripts/suspend.sh
bind = $mainMod, b, exec, ~/.dotfiles/scripts/battery-level.sh
bind = $mainMod, d, exec, ~/.dotfiles/scripts/date.sh

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , Print, exec, slurp | grim -g - - | wl-copy
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

## Window rules
# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*
# Fix some dragging issues with XWayland
windowrule = no_initial_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false

windowrule = workspace 7, match:class ^(Slack)$
windowrule = workspace 9, match:class ^(Spotify)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = float on, match:class ^(io\.github\.nozwock\.Packet)$

workspace = 1, monitor:DP-2, persistent:true
workspace = 2, monitor:DP-2, persistent:true
workspace = 3, monitor:DP-2, persistent:true
workspace = 4, monitor:DP-2, persistent:true
workspace = 5, monitor:DP-2, persistent:true
workspace = 6, monitor:DP-2, persistent:true
workspace = 7, monitor:DP-2, persistent:true
workspace = 8, monitor:DP-2, persistent:true
workspace = 9, monitor:DP-2, persistent:true
workspace = 0, monitor:DP-2, persistent:true

## Autostart
exec-once = hyprpaper &
exec-once = hypridle & # TODO do I want to have it here or in systemd?
exec-once = thunar --daemon

## Animations
animations {
    enabled = no

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}
